ктер еще до рождения (как у Исхака и Исмаила)","Окружение полностью формирует характер, поэтому в одной семье все дети одинаковые","Мудрые родители применяют разные методы к разным детям","Два брата в одинаковых условиях могут вырасти совершенно разными"],correctAnswer:1},{id:8,type:"single",difficulty:"hard",topic:"Уважение к детям",question:"Что ответил ученый Аль-Амаш человеку, который возмутился, что вокруг шейха собрались «какие-то дети»?",options:["«Они учатся адабу, прежде чем учить знания»","«Они завтра будут управлять этой страной»","«Замолчи, они сохраняют для тебя твою религию»","«Пророк повелел нам обучать молодых»"],correctAnswer:2},{id:9,type:"single",difficulty:"hard",topic:"Уважение к детям",question:"Как поступил Пророк ﷺ, когда ему подали чашу с водой, слева сидели уважаемые взрослые, а справа — самый младший мальчик?",options:["Передал чашу взрослым, так как они старше","Дал воду мальчику со словами наставления","Спросил разрешения у мальчика передать воду взрослым","Выпил всё сам, чтобы получить баракят"],correctAnswer:2},{id:10,type:"single",difficulty:"medium",topic:"Уважение к детям",question:"Почему Абдулла ибн Умар не ответил на вопрос Пророка ﷺ, хотя знал правильный ответ?",options:["Он боялся ошибиться перед взрослыми","Он постеснялся присутствовавших там старших сподвижников","Его отец Умар запретил ему говорить без разрешения","Он хотел уступить право ответа Абу Бакру"],correctAnswer:1},{id:11,type:"single",difficulty:"hard",topic:"Сокрытие ошибок",question:"Согласно книге «Риядат ас-Субьян», почему родителям следует закрывать глаза на редкие ошибки ребенка и не говорить ему, что они всё знают?",options:["Потому что шариат запрещает следить за мусульманами","Чтобы ребенок не потерял стыд и не начал грешить открыто","Потому что дети до совершеннолетия не записываются ангелами","Чтобы не травмировать его хрупкую психику"],correctAnswer:1},{id:12,type:"single",difficulty:"medium",topic:"Нрав и религия",question:"Какую частую ошибку родителей в понимании религии упомянула лектор?",options:["Они заставляют детей молиться до 7 лет","Они думают, что знание халяля/харама автоматически делает человека воспитанным с людьми","Они запрещают детям играть в дозволенные игры","Они слишком мягки в вопросах акиды"],correctAnswer:1},{id:13,type:"single",difficulty:"hard",topic:"Наставления",question:"Какую аналогию на арабском языке привела лектор, чтобы объяснить вред постоянных упреков?",options:["«Капля точит камень, но разрушает его»","«Дерево не растет быстрее, если его тянуть за ветки»","«Если к человеку много прикасаться, он перестает чувствовать»","«Громкий голос оглушает, а не обучает»"],correctAnswer:2},{id:14,type:"single",difficulty:"medium",topic:"Отдых",question:"Что, по словам лектора, произойдет с ребенком, если его постоянно загружать уроками, секциями и не давать отдыхать?",options:["Он станет великим ученым","Его сердце «умрет», и он будет искать пути сбежать от учебы","Он привыкнет к дисциплине и станет успешным","Его память улучшится, но испортится зрение"],correctAnswer:1},{id:15,type:"negative",difficulty:"hard",topic:"Поощрение",question:"Кто из перечисленных ученых (или их отцов) НЕ упоминался в лекции в контексте получения материальной награды (дирхамов/динаров) за учебу?",options:["Ибрахим ибн Адхам","Ученик имама Аш-Шафии (Аль-Хумайди)","Сын имама Аш-Шафии","Абдулла ибн аль-Мубарак"],correctAnswer:3},{id:16,type:"single",difficulty:"hard",topic:"Склонности ребенка",question:"Что советовал Ибн аль-Каййим делать с ребенком, который физически крепок, но совершенно не склонен к заучиванию шариатских знаний?",options:["Заставлять его учиться, пока сердце не привыкнет","Отдать его обучаться верховой езде и стрельбе для пользы Исламу","Оставить его без образования, пусть помогает по дому","Заставлять его учить хотя бы Коран наизусть"],correctAnswer:1},{id:17,type:"single",difficulty:"hard",topic:"Оскорбления",question:"Что, согласно лекции, скажет Аллах в Судный день родителю, который называл своего ребенка «обезьяной» или «коровой»?",options:["«Разве Я не запретил злословие?»","«Зачем ты позорил того, кого Я возвеличил?»","«Ты видел, что Я создал его обезьяной/коровой?»","«Ты будешь воскрешен вместе с теми, чьи имена произносил»"],correctAnswer:2},{id:18,type:"negative",difficulty:"medium",topic:"Наказание",question:"Что из перечисленного НЕ является условием дозволенности физического наказания ребенка по шариату?",options:["Не бить до крови и не ломать кости","Бить от одного до трех раз","Бить только после достижения совершеннолетия (балиг)","Бить только с воспитательной целью, а не от злости"],correctAnswer:2},{id:19,type:"single",difficulty:"hard",topic:"Наказание",question:"За что именно Пророк ﷺ слегка ударил Хасана по руке?",options:["За то, что он играл во время намаза","За то, что он взял в рот финик из закята (садака)","За то, что он ударил Хусейна","За то, что он перебил взрослого сподвижника"],correctAnswer:1},{id:20,type:"single",difficulty:"medium",topic:"Религия как наказание",question:"Почему лектор строго запретила фразу: «Ты не помыла посуду — иди быстро читай Коран!»?",options:["Потому что читать Коран без омовения нельзя","Потому что это формирует у ребенка восприятие религии как наказания","Потому что за мытье посуды награда больше","Потому что девочкам нельзя читать Коран в гневе"],correctAnswer:1},{id:21,type:"single",difficulty:"hard",topic:"Гнев",question:"Что сказал Умар ибн Абдул-Азиз человеку, который сильно его разозлил проступком?",options:["«Уходи, пока я не забыл о милосердии»","«Если бы я не был зол на тебя, я бы тебя наказал»","«Я накажу тебя вдвойне за твой поступок и мой гнев»","«Пусть Аллах накажет тебя вместо меня»"],correctAnswer:1},{id:22,type:"single",difficulty:"hard",topic:"Отношение к девочкам",question:"Какую особенность физического воспитания девочек подчеркнул Ибрахим ибн Аби Абля, делая замечание воспитателю дочери халифа?",options:["Девочек вообще нельзя бить ни при каких условиях","Девочек нужно бить только
